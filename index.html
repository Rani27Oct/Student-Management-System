!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>
</head>
<body>

<h2>Student Form</h2>

<input type="text" placeholder="Enter Name" id="name"><br><br>
<input type="email" placeholder="Enter Email" id="email"><br><br>
<input type="text" placeholder="Enter Course" id="course"><br><br>

<button onclick="addStudent()">Add Student</button>

<script>
function addStudent() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let course = document.getElementById("course").value;

    alert("Student Added:\n" + name + "\n" + email + "\n" + course);
}
</script>

</body>
</html>
